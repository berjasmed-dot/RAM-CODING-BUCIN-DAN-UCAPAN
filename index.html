<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            z-index: 10;
            transform: scale(0.9);
            opacity: 0;
            animation: popUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUp {
            to { transform: scale(1); opacity: 1; }
        }

        /* Frame Foto Lucu */
        .foto-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 6px solid #ffb3c6;
            overflow: hidden;
            position: relative;
            animation: bounce 3s ease-in-out infinite;
        }

        .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff477e;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #6c757d;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Tombol Musik */
        .btn-musik {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }

        .btn-musik:hover {
            background-color: #ff7096;
            transform: translateY(-3px);
        }

        /* Elemen Animasi Balon */
        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            bottom: -100px;
            opacity: 0.8;
            animation: floatUp 8s linear infinite;
        }

        .balloon::after {
            content: "🎈";
            font-size: 40px;
            position: absolute;
            top: 0; left: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        /* Efek Confetti Kanvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="confetti"></canvas>

    <div class="card">
        <!-- TEMPAT FOTO (Ganti foto-kita.jpg dengan file fotomu) -->
        <div class="foto-container">
            <img src="fotosaya.JPG.jpeg" alt="Foto Ulang Tahun" onerror="this.src='https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=500'">
        </div>

        <h1>Selamat Ulang Tahun! 🥳</h1>
        <p>Semoga di hari yang spesial ini, semua impianmu menjadi kenyataan. Tetap jadi orang yang ceria dan luar biasa ya! ✨💖</p>
        
        <!-- TOMBOL MUSIK -->
        <button class="btn-musik" id="musicBtn" onclick="toggleMusic()">🎵 Putar Lagu</button>
    </div>

    <!-- ELEMEN AUDIO (Ganti lagu-kita.mp3 dengan file lagumu) -->
    <audio id="bgMusic" loop>
        <source src="lagukita.mp3.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung pemutar musik.
    </audio>

    <script>
        // Fitur Pemutar Musik
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(error => console.log("Musik butuh interaksi user pertama kali."));
                btn.innerHTML = "⏸️ Jeda Lagu";
                btn.style.backgroundColor = "#6c757d";
            } else {
                music.pause();
                btn.innerHTML = "🎵 Putar Lagu";
                btn.style.backgroundColor = "#ff477e";
            }
        }

        // Animasi Balon Otomatis
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.animationDuration = (Math.random() * 4 + 4) + 's'; // Antara 4-8 detik
            document.body.appendChild(balloon);

            setTimeout(() => {
                balloon.remove();
            }, 8000);
        }
        setInterval(createBalloon, 800);

        // Animasi Efek Confetti (Hujan Kertas Warna-warni)
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let pieces = [];
        const numberOfPieces = 100;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class ConfettiPiece {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.color = `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.size = Math.random() * 8 + 5;
                this.speed = Math.random() * 3 + 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        for (let i = 0; i < numberOfPieces; i++) {
            pieces.push(new ConfettiPiece());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
